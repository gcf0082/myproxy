# myproxy 过滤配置文件

# 排除规则（不记录这些请求）
exclude:
  # 按文件扩展名过滤
  extensions:
    - .js
    - .css
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .svg
    - .ico
    - .woff
    - .woff2
    - .ttf
    - .eot
    - .map

  # 按URL关键字排除
  url_patterns:
    - "/static/"
    - "/assets/"
    - "/fonts/"
    - "/images/"

# 包含规则（可选，只有匹配这些才记录，为空则不限制）
include:
  url_patterns: []